name: IoTLessonsArduinoBuild

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Clone Repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Compile By Arduino CLI Action
      - name: Compile Arduino Sketch
        uses: arduino/compile-sketches@v1
        with:
          # 
          fqbn: "arduino:avr:nano"
          
          # Path for Ino File
          sketch-paths: "./Lesson2HomeTask/sketch_jul7b"
          
          # Extended libraries if they used in app
          # libraries: |
          #   - name: "DHT sensor library"
          #   - name: "Adafruit Unified Sensor"
